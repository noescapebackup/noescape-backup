<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ST NEXT</title>

<style>
html,body{
  margin:0;
  min-height:100%;
  background:#061428 url('../../images/lp_world/lwN_exbackg2.png') center/cover fixed no-repeat;
  text-align:center;
  font-family:sans-serif;
}

img{
  max-width:100%;
  height:auto;
  display:block;
  margin:0 auto 24px;
}

.fade{
  opacity:0;
  transform:translateY(24px);
  animation:fadeInUp 1s ease forwards;
}

.fade:nth-of-type(1){animation-delay:.1s;}
.fade:nth-of-type(2){animation-delay:.3s;}
.fade:nth-of-type(3){animation-delay:.5s;}
.fade:nth-of-type(4){animation-delay:.7s;}
.fade:nth-of-type(5){animation-delay:.9s;}
.fade:nth-of-type(6){animation-delay:1.1s;}
.fade:nth-of-type(7){animation-delay:1.3s;}
.fade:nth-of-type(8){animation-delay:1.5s;}
.fade:nth-of-type(9){animation-delay:1.7s;}
.fade:nth-of-type(10){animation-delay:1.9s;}

@keyframes fadeInUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.exnext{
  display:inline-block;
  text-align:center;
  margin:30px auto;
  padding:10px 30px;
  border-radius:5px;
  color:#ffffff;
  line-height:1.3;
  font-size:small;
  font-weight:bold;
  background-color:#0f23b5;
  border-bottom:5px solid #0f0395;
  text-decoration:none;
}

.exnext:hover{
  border-bottom:2px solid #0f0395;
  text-decoration:none;
}
</style>
</head>
