<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>STAGE4</title>

<style>
html,body{
    margin:0;
    background:#061428 url('../../images/lp_world/lpwop_backg.jpg') center/cover fixed no-repeat;
    text-align:center;
    font-family:sans-serif;
}

img{
    max-width:100%;
    height:auto;
    display:block;
    margin:auto;
}

.glitch{
    position:relative;
    display:inline-block;
}

.normal{
    position:relative;
}

.bug{
    position:absolute;
    left:0;
    top:0;
    opacity:0;
    transition:.15s;
}

.glitch.is-bug .bug{
    opacity:1;
}

.glitch.is-bug .normal{
    opacity:0;
}

.fade{
    opacity:0;
    transform:translateY(25px);
    animation:fade .8s forwards;
}

.fade:nth-child(1){animation-delay:.2s;}
.fade:nth-child(2){animation-delay:.5s;}
.fade:nth-child(3){animation-delay:.8s;}
.fade:nth-child(4){animation-delay:1.1s;}
.fade:nth-child(5){animation-delay:1.4s;}

@keyframes fade{
to{
opacity:1;
transform:none;
}
}

.tsuzuki{
    display:inline-block;
    margin:30px auto;
    padding:10px 30px;
    background:#666;
    color:#fff;
    text-decoration:none;
    border-radius:6px;
    border-bottom:5px solid #464646;
    font-weight:bold;
}

.tsuzuki:hover{
    border-bottom:2px solid #464646;
}
</style>

</head>

<body>

<div class="fade">
<img src="../../images/lp_world/lwN_time70.png">
</div>

<div class="glitch" id="switchline">
<img class="bug" src="../../images/lp_world/lwN_L1.jpg">
<img class="normal" src="../../images/lp_world/lwN_LR1.jpg">
</div>

<div class="glitch">
<img class="bug" src="../../images/lp_world/lwN_L2.jpg">
<img class="normal" src="../../images/lp_world/lwN_LR22.jpg">
</div>

<div class="glitch">
<img class="bug" src="../../images/lp_world/lwN_L3.png">
<img class="normal" src="../../images/lp_world/lwN_LR3.png">
</div>

<div class="glitch">
<img class="bug" src="../../images/lp_world/lwN_L4v2.png">
<img class="normal" src="../../images/lp_world/lwN_LR4.png">
</div>

<br><br><br>

<div class="fade">
<img src="../../images/lp_world/lwN_LS13.png">
</div>

<div class="fade">
<img src="../../images/lp_world/lwN_LS22.png">
</div>

<div class="fade">
<img src="../../images/lp_world/lwN_LS32.png">
</div>

<a class="tsuzuki" href="../st_check/">
次へ
</a>

<script>

const glitches=document.querySelectorAll(".glitch");

setInterval(()=>{

glitches.forEach(g=>g.classList.remove("is-bug"));

const random=Math.floor(Math.random()*glitches.length);

glitches[random].classList.add("is-bug");

setTimeout(()=>{
glitches[random].classList.remove("is-bug");
},120);

},1200);

</script>

</body>
</html>
