<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STAGE4</title>

<style>
html,body{
    margin:0;
    padding:0;
    background:#061428 url('../../images/lp_world/lpwop_backg.jpg') center/cover fixed no-repeat;
    text-align:center;
    font-family:sans-serif;
}

img{
    max-width:100%;
    height:auto;
    display:block;
    margin:0 auto;
}

.fade{
    opacity:0;
    transform:translateY(20px);
    animation:fadeIn 1.2s forwards;
}

.fade:nth-of-type(1){animation-delay:.2s;}
.fade:nth-of-type(2){animation-delay:.5s;}
.fade:nth-of-type(3){animation-delay:.8s;}
.fade:nth-of-type(4){animation-delay:1.1s;}

@keyframes fadeIn{
to{
opacity:1;
transform:none;
}
}

.glitch{
    position:relative;
    display:block;
    width:fit-content;
    margin:0 auto;
}

.normal{
    display:block;
}

.bug{
    position:absolute;
    inset:0;
    opacity:0;
    transition:.08s;
}

.glitch.is-bug .bug{
    opacity:1;
}

.glitch.is-bug .normal{
    opacity:0;
}

.tsuzuki{
    display:inline-block;
    margin:40px auto;
    padding:12px 30px;
    border-radius:5px;
    color:#fff;
    background:#666;
    border-bottom:5px solid #464646;
    text-decoration:none;
    font-weight:bold;
}

.tsuzuki:hover{
    border-bottom:2px solid #464646;
}
</style>
</head>

<body>

<div class="fade">
<img src="../../images/lp_world/lwN_time70.png">
</div>

<div class="fade">

<div class="glitch">
<img class="bug" src="../../images/lp_world/lwN_L1.jpg">
<img class="normal" src="../../images/lp_world/lwN_LR1.jpg">
</div>

<div class="glitch">
<img class="bug" src="../../images/lp_world/lwN_L2.jpg">
<img class="normal" src="../../images/lp_world/lwN_LR22.jpg">
</div>

<div class="glitch">
<img class="bug" src="../../images/lp_world/lwN_L3.png">
<img class="normal" src="../../images/lp_world/lwN_LR3.png">
</div>

<div class="glitch">
<img class="bug" src="../../images/lp_world/lwN_L4v2.png">
<img class="normal" src="../../images/lp_world/lwN_LR4.png">
</div>

</div>

<br><br><br>

<div class="fade">
<img src="../../images/lp_world/lwN_LS13.png">
</div>

<div class="fade">
<img src="../../images/lp_world/lwN_LS22.png">
</div>

<div class="fade">
<img src="../../images/lp_world/lwN_LS32.png">
</div>

<div class="fade">
<img src="../../images/lp_world/lwN_5.png">
</div>

<br><br><br>

<script>

const glitches=document.querySelectorAll(".glitch");

setInterval(()=>{

glitches.forEach(g=>g.classList.remove("is-bug"));

const index=Math.floor(Math.random()*glitches.length);

glitches[index].classList.add("is-bug");

setTimeout(()=>{
glitches[index].classList.remove("is-bug");
},120);

},900);

</script>

</body>
</html>
