<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>リトルパラレルワールド</title>

<style>
html,
body{
  margin:0;
  min-height:100%;
  font-family:sans-serif;
  text-align:center;
  background:#061428;
}

.wrap{
  position:fixed;
  inset:0;
  z-index:-1;
  overflow:hidden;
  background-image:url("/noescape-backup/images/lp_world/lpwop_backg.jpg");
  background-size:cover;
  background-position:center;
}

img{
  display:block;
  max-width:100%;
  height:auto;
  margin:0 auto 24px;
}

#skipstop{
  background-color:#221714;
  position:fixed;
  inset:0;
  color:white;
  font-weight:bold;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:10;
}

.formbox{
  padding:24px 16px;
}

input{
  text-align:center;
  color:black;
  padding:10px;
  font-size:18px;
  border-radius:4px;
  border:2px solid #999;
  max-width:80%;
}

#secContent{
  display:none;
  padding:20px 12px 80px;
}

.check{
  text-align:center;
  margin:auto;
  padding:8px 30px;
  border-radius:5px;
  background-color:black;
  color:#ffffff;
  line-height:1.3;
  border:1px solid white;
  font-size:large;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="wrap"></div>

<div id="skipstop">
  <div class="formbox">
    <span style="color:yellow;font-size:large;">※※確認ページ※※</span><br><br>
    1つ前の謎で導いた「●●●●の場所へ」の<br>
    ●●●●を入力してください。<br><br>

    <input type="text" id="secretform" placeholder="４文字の言葉を入力"><br><br>
    <button type="button" id="checkskip" class="check">確　認</button>
  </div>
</div>

<div id="secContent">
  <img src="/noescape-backup/images/lp_world/lwN_time80.png" alt="">
  <img src="/noescape-backup/images/lp_world/lwN_secret2-1.jpg" alt="">
</div>

<script>
const skipStop = document.getElementById("skipstop");
const secContent = document.getElementById("secContent");
const checkskip = document.getElementById("checkskip");
const secretform = document.getElementById("secretform");

function normalizeText(value){
  return value.trim().replace(/\s/g,"");
}

function showSecretContent(){
  skipStop.style.display = "none";
  secContent.style.display = "block";
}

checkskip.addEventListener("click", function(){
  const ans = normalizeText(secretform.value);

  if(
    ans === "くりっぷ" ||
    ans === "クリップ" ||
    ans === "ｸﾘｯﾌﾟ"
  ){
    showSecretContent();
  }else{
    alert("不正解");
  }
});

secretform.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    checkskip.click();
  }
});

</script>

</body>
</html>
