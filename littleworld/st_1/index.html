<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>st_1</title>

<style>
body{
    margin:0;
    color:#fff;
    font-family:sans-serif;
    text-align:center;
}

.wrap{
    position:fixed;
    inset:0;
    z-index:-1;
    background:url('../../images/st_1/lpwop_backg.jpg') center/cover no-repeat;
}

img{
    max-width:100%;
    height:auto;
    display:block;
    margin:0 auto 24px;
}

p{
    color:#fff;
}

.btn{
    display:inline-block;
    padding:10px 18px;
    border-radius:6px;
    text-decoration:none;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.btnc--s{
    background:#6a5acd;
    border-bottom:5px solid #4a3aad;
}

.btnc--s:hover{
    margin-top:3px;
    border-bottom:2px solid #4a3aad;
}

.next{
    display:inline-block;
    margin-top:30px;
    padding:14px 26px;
    background:#ffffff;
    color:#000;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="wrap"></div>

<img src="../../images/lp_world/lwN_1-1.png">

<img src="../../images/lp_world/lwN_1-23.png">

<div onclick="toggleMap()">
    <a class="btn btnc--s">大まかな異変の位置を見る</a>
</div>

<div id="map" style="display:none;">
    <br>
    <img src="../../images/lp_world/lwN_ichi3.png">
</div>

<br>

<a class="next" href="https://noescapebackup.github.io/noescape-backup/littleworld/st_2/">
    指示通りに移動したら次へ
</a>

<script>
function toggleMap(){
    const map=document.getElementById("map");
    map.style.display=(map.style.display==="none")?"block":"none";
}
</script>

</body>
</html>
